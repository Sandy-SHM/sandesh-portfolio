<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandesh Sharad Mane — AIML Engineer</title>
<meta name="description" content="Sandesh Sharad Mane — AIML Engineer. B.Tech CS (AI & ML), VIT Bhopal. Ask me anything.">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAFAF8;
    --card:#FFFFFF;
    --line:#ECEAE4;
    --text:#181818;
    --muted:#6B6B6B;
    --blue:#4C7EF3;
    --peach:#F5A26B;
    --pink:#F08BB4;
    --green:#5FBE8A;
    --purple:#9B87F0;
    --yellow:#F0C25E;
    --display:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--body);
    min-height:100vh;overflow-x:hidden;position:relative;
  }
  a{color:inherit;text-decoration:none;}
  img{max-width:100%;display:block;}
  ::selection{background:var(--blue);color:#fff;}
  :focus-visible{outline:2px solid var(--blue);outline-offset:3px;}

  .blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;will-change:transform;}
  #b1{width:480px;height:480px;background:radial-gradient(circle, var(--blue), transparent 70%);opacity:.28;top:0;left:0;transform:translate(-50%,-50%);}
  #b2{width:420px;height:420px;background:radial-gradient(circle, var(--pink), transparent 70%);opacity:.25;top:0;left:0;transform:translate(-50%,-50%);}
  #b3{width:380px;height:380px;background:radial-gradient(circle, var(--yellow), transparent 70%);opacity:.22;bottom:0;right:0;transform:translate(50%,50%);}

  .wrap{max-width:760px;margin:0 auto;padding:0 24px;position:relative;z-index:1;}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:24px 0;}
  .topbar .badge{
    font-family:var(--mono);font-size:12px;color:var(--muted);
    border:1px solid var(--line);background:var(--card);padding:7px 14px;border-radius:20px;
  }
  .topbar .resume-link{
    font-family:var(--mono);font-size:12.5px;color:var(--text);
    border:1px solid var(--line);background:var(--card);padding:8px 16px;border-radius:20px;
    transition:border-color .15s ease;
  }
  .topbar .resume-link:hover{border-color:var(--blue);color:var(--blue);}

  main.hero{
    min-height:calc(100vh - 80px);display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:40px 0 60px;
  }

  .greet{font-family:var(--body);font-size:17px;color:var(--muted);margin-bottom:6px;
    opacity:0;animation:fadeUp .6s ease forwards;}
  h1.role-heading{
    font-family:var(--display);font-weight:800;font-size:clamp(40px,7vw,68px);
    line-height:1.02;letter-spacing:-0.02em;
    background:linear-gradient(90deg,var(--blue),var(--purple) 50%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;animation:fadeUp .6s ease .1s forwards;
  }

  .name-plate{
    margin:36px 0 30px;padding:22px 40px;background:var(--card);
    border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,0.05);
    opacity:0;animation:fadeUp .6s ease .2s forwards;
  }
  .name-plate .name-text{
    font-family:var(--display);font-weight:700;font-size:clamp(22px,4vw,32px);letter-spacing:-0.01em;
  }
  .name-plate .name-sub{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:6px;}

  .ask-box{
    width:100%;max-width:560px;display:flex;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px 8px 8px 20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.05);
    opacity:0;animation:fadeUp .6s ease .3s forwards;
  }
  .ask-box input{
    flex:1;border:none;outline:none;background:transparent;font-family:var(--body);
    font-size:15px;color:var(--text);
  }
  .ask-box input::placeholder{color:#B5B3AC;}
  .ask-box button{
    background:var(--blue);color:#fff;border:none;border-radius:12px;
    width:42px;height:42px;font-size:16px;cursor:pointer;flex-shrink:0;
    transition:background .15s ease;display:flex;align-items:center;justify-content:center;
  }
  .ask-box button:hover{background:#3b6de0;}

  .chip-row{
    display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:34px;max-width:640px;
    opacity:0;animation:fadeUp .6s ease .4s forwards;
  }
  .chip{
    display:flex;flex-direction:column;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:16px 22px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    min-width:96px;
  }
  .chip:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,0.08);}
  .chip .chip-icon{
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }
  .chip[data-q="me"] .chip-icon{background:#FDECD8;}
  .chip[data-q="projects"] .chip-icon{background:#E2F5EA;}
  .chip[data-q="skills"] .chip-icon{background:#EDE7FD;}
  .chip[data-q="fun"] .chip-icon{background:#FCE4EF;}
  .chip[data-q="contact"] .chip-icon{background:#E4EDFD;}
  .chip .chip-label{font-family:var(--mono);font-size:12.5px;color:var(--text);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

  /* ANSWER PANEL */
  .answer-panel{
    width:100%;max-width:640px;margin-top:28px;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:0;box-shadow:0 14px 44px rgba(0,0,0,0.07);
    max-height:0;opacity:0;overflow:hidden;transition:max-height .45s ease, opacity .4s ease, padding .45s ease;
  }
  .answer-panel.is-open{max-height:1400px;opacity:1;padding:26px 28px;}
  .answer-q{font-family:var(--mono);font-size:12px;color:var(--blue);margin-bottom:14px;}
  .answer-body{font-size:14.5px;line-height:1.7;color:var(--text);}
  .answer-body p{margin-bottom:12px;}
  .answer-body p:last-child{margin-bottom:0;}

  .me-row{display:flex;gap:18px;align-items:flex-start;margin-bottom:14px;}
  .me-photo{width:88px;height:88px;border-radius:14px;overflow:hidden;flex-shrink:0;border:1px solid var(--line);}
  .me-photo img{width:100%;height:100%;object-fit:cover;}
  .me-name{font-family:var(--display);font-weight:700;font-size:19px;}
  .me-tag{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:4px;}

  .badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
  .badge-pill{
    font-family:var(--mono);font-size:11.5px;color:var(--text);
    background:var(--bg);border:1px solid var(--line);padding:5px 11px;border-radius:14px;
  }

  .proj-block{border-top:1px solid var(--line);padding-top:14px;margin-top:14px;}
  .proj-block:first-child{border-top:none;padding-top:0;margin-top:0;}
  .proj-name{font-family:var(--display);font-weight:700;font-size:16px;margin-bottom:6px;}
  .proj-links a{font-family:var(--mono);font-size:11.5px;color:var(--blue);margin-right:14px;}
  .proj-desc{font-size:13.5px;color:var(--muted);margin:8px 0 8px;}

  .skill-group{margin-bottom:14px;}
  .skill-group:last-child{margin-bottom:0;}
  .skill-group-name{font-family:var(--mono);font-size:11px;color:var(--purple);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}

  .contact-links{display:flex;flex-direction:column;gap:10px;}
  .contact-row{display:flex;justify-content:space-between;align-items:center;
    background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 16px;}
  .contact-row .k{font-family:var(--mono);font-size:11.5px;color:var(--muted);}
  .contact-row .v{font-family:var(--body);font-weight:600;font-size:14px;}

  .cursor-typing{display:inline-block;width:2px;height:1em;background:var(--blue);
    margin-left:2px;vertical-align:-0.15em;animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0;}}

  footer{text-align:center;padding:26px 0;font-family:var(--mono);font-size:12px;color:var(--muted);position:relative;z-index:1;}

  @media (prefers-reduced-motion: reduce){
    .greet, h1.role-heading, .name-plate, .ask-box, .chip-row{animation:none;opacity:1;}
  }

  @media (max-width:600px){
    .chip{min-width:78px;padding:14px 14px;}
    .me-row{flex-direction:column;}
  }
</style>
</head>
<body>

<div class="blob" id="b1"></div>
<div class="blob" id="b2"></div>
<div class="blob" id="b3"></div>

<div class="wrap">
  <div class="topbar">
    <div class="badge">open to CSE roles</div>
    <a class="resume-link" href="assets/Sandesh_Sharad_Mane_Resume.pdf" target="_blank" rel="noopener">resume ↗</a>
  </div>
</div>

<main class="hero">
  <div class="greet">Hey, I'm 👋</div>
  <h1 class="role-heading">AIML Engineer</h1>

  <div class="name-plate">
    <div class="name-text">SANDESH SHARAD MANE</div>
    <div class="name-sub">B.Tech Computer Science Engineering (AI &amp; ML) — VIT Bhopal</div>
  </div>

  <div class="ask-box">
    <input type="text" id="askInput" placeholder="Ask me anything...">
    <button id="askSend" aria-label="Ask">→</button>
  </div>

  <div class="chip-row">
    <div class="chip" data-q="me"><div class="chip-icon">😄</div><div class="chip-label">Me</div></div>
    <div class="chip" data-q="projects"><div class="chip-icon">💼</div><div class="chip-label">Projects</div></div>
    <div class="chip" data-q="skills"><div class="chip-icon">📚</div><div class="chip-label">Skills</div></div>
    <div class="chip" data-q="fun"><div class="chip-icon">🎉</div><div class="chip-label">Fun</div></div>
    <div class="chip" data-q="contact"><div class="chip-icon">👤</div><div class="chip-label">Contact</div></div>
  </div>

  <div class="answer-panel" id="answerPanel">
    <div class="answer-q" id="answerQ"></div>
    <div class="answer-body" id="answerBody"></div>
  </div>
</main>

<footer>© 2026 Sandesh Sharad Mane</footer>

<script>
  // Cursor-reactive dancing blobs
  (function(){
    var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var b1 = document.getElementById('b1');
    var b2 = document.getElementById('b2');
    var mx = window.innerWidth/2, my = window.innerHeight/2;
    var p1x = mx, p1y = my, p2x = mx, p2y = my;
    if(reduce){ b1.style.left='20%'; b1.style.top='20%'; b2.style.left='80%'; b2.style.top='40%'; return; }
    window.addEventListener('mousemove', function(e){ mx = e.clientX; my = e.clientY; });
    function loop(){
      p1x += (mx - p1x) * 0.06; p1y += (my - p1y) * 0.06;
      p2x += (mx - p2x) * 0.03; p2y += (my - p2y) * 0.03;
      b1.style.transform = 'translate(' + (p1x-240) + 'px,' + (p1y-240) + 'px)';
      b2.style.transform = 'translate(' + (p2x-210) + 'px,' + (p2y-210) + 'px)';
      requestAnimationFrame(loop);
    }
    loop();
  })();

  // Content data
  var ANSWERS = {
    me: {
      q: "Tell me about yourself",
      html: '<div class="me-row"><div class="me-photo"><img src="assets/photo.jpg" alt="Sandesh Sharad Mane"></div>' +
        '<div><div class="me-name">Sandesh Sharad Mane</div><div class="me-tag">AIML Engineer · Product-minded builder</div>' +
        '<div class="badge-row"><span class="badge-pill">VIT Bhopal</span><span class="badge-pill">AI &amp; ML</span><span class="badge-pill">Fintech curious</span><span class="badge-pill">Product Management</span></div></div></div>' +
        '<p>I\'m a B.Tech Computer Science (AI &amp; ML) student who builds and ships full-stack, production-grade software — from backend APIs and deployment infrastructure to the ML/LLM systems that power them. I\'ve shipped two applications end-to-end, integrating LLM APIs behind clean internal abstractions, RAG pipelines, and strict schema-validated output.</p>' +
        '<p>Beyond writing code, I\'m genuinely drawn to the <strong>product side</strong> of building things — how a feature decision, a pricing model, or a user flow shapes whether something actually gets used. I\'m especially interested in <strong>fintech</strong>, and open to roles in <strong>Product Management</strong> as much as core engineering.</p>' +
        '<p>Outside of that: I\'m a family-oriented, modern yet spiritual person — someone who likes to stay grounded while building fast.</p>' +
        '<p style="margin-top:14px;"><span class="badge-pill">🎓 B.Tech CSE (AI &amp; ML), VIT Bhopal — Exp. May 2028</span></p>' +
        '<p><span class="badge-pill">Applied ML in Python — Univ. of Michigan/Coursera</span> &nbsp;<span class="badge-pill">NPTEL Cloud Computing — Elite, 87%</span></p>' +
        '<p><span class="badge-pill">Deloitte Data Analytics Job Sim — Forage</span> &nbsp;<span class="badge-pill">AI Tools &amp; ChatGPT Workshop — Be10X</span></p>'
    },
    projects: {
      q: "What have you built?",
      html:
        '<div class="proj-block"><div class="proj-name">CodeSense</div>' +
        '<div class="proj-links"><a href="https://codesense-cyan.vercel.app" target="_blank" rel="noopener">live app ↗</a><a href="https://github.com/Sandy-SHM" target="_blank" rel="noopener">source ↗</a></div>' +
        '<p class="proj-desc">RAG-powered code review assistant — React/Monaco frontend, FastAPI backend, LangChain + ChromaDB retrieval, Groq API (Llama 3.3 70B) behind a schema-validated internal layer, SSE streaming for sub-second first-token latency.</p></div>' +
        '<div class="proj-block"><div class="proj-name">AI Resume Analyzer</div>' +
        '<div class="proj-links"><a href="https://ai-resume-analyzer-k4lshdkjuaqmxyjmqntdek.streamlit.app" target="_blank" rel="noopener">live app ↗</a><a href="https://github.com/Sandy-SHM" target="_blank" rel="noopener">source ↗</a></div>' +
        '<p class="proj-desc">LLM-driven resume analysis tool — PyMuPDF/pdfplumber extraction, Llama 3.3 70B for a 10-dimension analysis, strict JSON schema output, Plotly visualizations + downloadable ReportLab PDF report.</p></div>' +
        '<div class="proj-block"><div class="proj-name">Telemetry Unifier</div>' +
        '<p class="proj-desc">Python ETL pipeline that ingests IoT sensor data from multiple heterogeneous JSON sources and normalizes inconsistent schemas into a unified structure.</p></div>'
    },
    skills: {
      q: "What's your stack?",
      html:
        '<div class="skill-group"><div class="skill-group-name">Languages</div><div class="badge-row"><span class="badge-pill">Python</span><span class="badge-pill">Java</span><span class="badge-pill">C++</span></div></div>' +
        '<div class="skill-group"><div class="skill-group-name">Backend &amp; Infrastructure</div><div class="badge-row"><span class="badge-pill">FastAPI</span><span class="badge-pill">REST APIs</span><span class="badge-pill">SSE streaming</span><span class="badge-pill">Docker</span><span class="badge-pill">Git/GitHub</span><span class="badge-pill">Render</span><span class="badge-pill">Vercel</span></div></div>' +
        '<div class="skill-group"><div class="skill-group-name">AI / ML &amp; LLM Tooling</div><div class="badge-row"><span class="badge-pill">LangChain</span><span class="badge-pill">RAG pipelines</span><span class="badge-pill">ChromaDB</span><span class="badge-pill">sentence-transformers</span><span class="badge-pill">Groq API</span><span class="badge-pill">Llama 3.3 70B</span><span class="badge-pill">scikit-learn</span></div></div>' +
        '<div class="skill-group"><div class="skill-group-name">Frontend &amp; Data</div><div class="badge-row"><span class="badge-pill">React</span><span class="badge-pill">Streamlit</span><span class="badge-pill">Pandas</span><span class="badge-pill">NumPy</span><span class="badge-pill">Plotly</span><span class="badge-pill">PyMuPDF</span><span class="badge-pill">ReportLab</span></div></div>'
    },
    fun: {
      q: "Tell me something fun",
      html:
        '<p>🏏 <strong>Totally into cricket</strong> — not a casual watcher, a proper enthusiast.</p>' +
        '<p>⛰️ 🏖️ Love both mountains and beaches, but if I had to pick, <strong>mountains win</strong> every time.</p>' +
        '<p>🧠 A deep-dive learner at heart — genuinely enthusiastic about general knowledge and understanding things properly, not just surface-level.</p>' +
        '<p>📚 I read widely across different books, and I write <strong>shayaris</strong> on the side.</p>' +
        '<p>🏡 Family-oriented, modern yet spiritual — I like staying rooted while I build and grow.</p>'
    },
    contact: {
      q: "How do I reach you?",
      html:
        '<div class="contact-links">' +
        '<a class="contact-row" href="mailto:sandeshsharadmane03@gmail.com"><span class="k">Email</span><span class="v">sandeshsharadmane03@gmail.com</span></a>' +
        '<a class="contact-row" href="tel:+918279922896"><span class="k">Phone</span><span class="v">+91 82799 22896</span></a>' +
        '<a class="contact-row" href="https://www.linkedin.com/in/sandesh-sharad-mane-4671583bb/" target="_blank" rel="noopener"><span class="k">LinkedIn</span><span class="v">sandesh-sharad-mane</span></a>' +
        '<a class="contact-row" href="https://github.com/Sandy-SHM" target="_blank" rel="noopener"><span class="k">GitHub</span><span class="v">Sandy-SHM</span></a>' +
        '<a class="contact-row" href="assets/Sandesh_Sharad_Mane_Resume.pdf" target="_blank" rel="noopener"><span class="k">Resume</span><span class="v">Download PDF ↗</span></a>' +
        '</div>'
    }
  };

  var KEYWORD_MAP = [
    [/fintech|product manager|product management|pm\b/i, 'me'],
    [/project|codesense|resume analyzer|telemetry|built|shipped/i, 'projects'],
    [/skill|stack|tech|tool|language/i, 'skills'],
    [/fun|hobby|hobbies|cricket|mountain|beach|book|shayari|interest/i, 'fun'],
    [/contact|email|phone|linkedin|github|reach|resume/i, 'contact'],
    [/who are you|about you|yourself|background/i, 'me']
  ];

  var panel = document.getElementById('answerPanel');
  var qEl = document.getElementById('answerQ');
  var bodyEl = document.getElementById('answerBody');
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function showAnswer(key, customQ){
    var data = ANSWERS[key];
    if(!data) return;
    qEl.textContent = customQ ? ('"' + customQ + '"') : data.q;
    panel.classList.add('is-open');
    if(reduceMotion){
      bodyEl.innerHTML = data.html;
      panel.scrollIntoView({behavior:'auto', block:'nearest'});
      return;
    }
    bodyEl.innerHTML = '<span class="cursor-typing"></span>';
    setTimeout(function(){
      bodyEl.innerHTML = data.html;
      panel.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 420);
  }

  document.querySelectorAll('.chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      showAnswer(chip.getAttribute('data-q'));
    });
  });

  function handleAsk(){
    var val = document.getElementById('askInput').value.trim();
    if(!val) return;
    var matched = 'me';
    for(var i=0;i<KEYWORD_MAP.length;i++){
      if(KEYWORD_MAP[i][0].test(val)){ matched = KEYWORD_MAP[i][1]; break; }
    }
    showAnswer(matched, val);
    document.getElementById('askInput').value = '';
  }

  document.getElementById('askSend').addEventListener('click', handleAsk);
  document.getElementById('askInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter') handleAsk();
  });
</script>

</body>
</html>
